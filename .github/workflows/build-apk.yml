name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Generate signing keystore
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -base64 16)
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          keytool -genkey -v -keystore android.keystore \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=MuslimReminder, OU=Dev, O=MuslimReminder, L=Unknown, ST=Unknown, C=XX"

      - name: Create TWA manifest
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.muslimreminder.app",
            "host": "kurmuz.github.io",
            "name": "MuslimReminder",
            "launcherName": "MuslimReminder",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0D1B2A",
            "themeColorDark": "#0D1B2A",
            "navigationColor": "#0D1B2A",
            "navigationColorDark": "#0D1B2A",
            "navigationDividerColor": "#0D1B2A",
            "navigationDividerColorDark": "#0D1B2A",
            "backgroundColor": "#0D1B2A",
            "startUrl": "/noch-kadr/",
            "iconUrl": "https://kurmuz.github.io/noch-kadr/icon-512.png",
            "maskableIconUrl": "https://kurmuz.github.io/noch-kadr/icon-192.png",
            "appVersion": "1.0.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "my-key-alias"
            },
            "enableNotifications": false,
            "enableSiteSettingsShortcut": true,
            "webManifestUrl": "https://kurmuz.github.io/noch-kadr/manifest.json",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "splashScreenFadeOutDuration": 300
          }
          EOF

      - name: Generate Android project
        run: bubblewrap update --skipVersionUpgrade
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Build APK
        run: bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: muslim-reminder-apk
          path: |
            app-release-signed.apk
            app-release-unsigned.apk
            app/build/outputs/apk/release/app-release-signed.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release-bundle.aab
          if-no-files-found: warn
