name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Call PWABuilder Cloud API
        run: |
          curl -X POST "https://pwabuilder.com/cloud/generateAppPackage" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "https://kurmuz.github.io/noch-kadr/",
              "name": "MuslimReminder",
              "launcherName": "MuslimReminder",
              "packageId": "com.muslimreminder.app",
              "appVersion": "1.0.0.0",
              "appVersionCode": 1,
              "webManifestUrl": "https://kurmuz.github.io/noch-kadr/manifest.json",
              "backgroundColor": "#0D1B2A",
              "themeColor": "#0D1B2A",
              "navigationColor": "#0D1B2A",
              "display": "standalone",
              "orientation": "portrait",
              "signing": null,
              "signingMode": "new",
              "includeSourceCode": false,
              "fallbackType": "customtabs",
              "enableNotifications": false,
              "enableSiteSettingsShortcut": true,
              "isChromeOSOnly": false,
              "features": {
                "locationDelegation": { "enabled": false },
                "playBilling": { "enabled": false }
              }
            }' \
            --output package.zip

      - name: Extract and upload APK
        run: |
          unzip -o package.zip -d apk-output
          ls -la apk-output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: muslim-reminder-apk
          path: apk-output/*.apk
          if-no-files-found: warn
