name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          echo "n" | bubblewrap init \
            --manifest="https://kurmuz.github.io/noch-kadr/manifest.json" \
            --directory="./twa" || true
          ls -la ./twa/

      - name: Build APK
        run: |
          cd twa
          bubblewrap build || echo "--- trying gradle directly ---"
          if [ ! -f app/build/outputs/apk/release/*.apk ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muslim-reminder-apk
          path: |
            twa/app/build/outputs/apk/release/*.apk
            twa/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
