<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ночь Кадр</title>
<link rel="manifest" href="manifest.json?v=3">
<script src="cities.js?v=3"></script>
<script src="azkar.js?v=3"></script>
<script src="adhan.js?v=3"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D1B2A;--card:#1A233A;--accent:#4FC3F7;--accent-dim:rgba(79,195,247,0.12);--text:#E0E0E0;--text-dim:#8899AA;--success:#66BB6A;--gold:#FFD54F;--danger:#EF5350;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,0.3)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
header{background:var(--card);padding:10px 16px 8px;border-bottom:1px solid rgba(79,195,247,0.1);flex-shrink:0}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.logo{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:0.5px;flex-shrink:0}
.logo span{color:var(--gold)}
.header-top select{background:var(--bg);color:var(--text);border:1px solid rgba(79,195,247,0.2);border-radius:8px;padding:6px 10px;font-size:14px;outline:none;flex:1;min-width:0;cursor:pointer}
.settings-btn{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;transition:color 0.2s}
.settings-btn:hover{color:var(--accent)}
#dateDisplay{font-size:12px;color:var(--text-dim);text-align:center}
.reminder{background:linear-gradient(135deg,rgba(79,195,247,0.12),rgba(79,195,247,0.05));border:1px solid rgba(79,195,247,0.2);border-radius:var(--radius);padding:8px 16px;margin:6px 12px 0;text-align:center;font-size:14px;color:var(--accent);font-weight:600;letter-spacing:0.3px;display:none;flex-shrink:0;animation:pulseReminder 2s ease-in-out infinite}
.reminder.show{display:block}
@keyframes pulseReminder{0%,100%{opacity:0.8}50%{opacity:1;box-shadow:0 0 16px rgba(79,195,247,0.15)}}
main{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
main::-webkit-scrollbar{width:0;height:0}
.tab-content{display:none}
.tab-content.active{display:block}
nav{display:flex;background:var(--card);border-top:1px solid rgba(79,195,247,0.1);flex-shrink:0;padding:4px 0;padding-bottom:max(4px,env(safe-area-inset-bottom,4px))}
nav button{flex:1;background:none;border:none;color:var(--text-dim);font-size:11px;font-weight:500;padding:6px 4px;cursor:pointer;transition:all 0.2s;border-radius:8px;margin:0 2px}
nav button .nav-icon{font-size:20px;display:block;margin-bottom:1px}
nav button.active{color:var(--accent);background:var(--accent-dim)}

.prayer-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.prayer-item{background:var(--card);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);border:1px solid transparent;transition:all 0.25s}
.prayer-item.current{border-color:var(--accent);background:linear-gradient(135deg,var(--card),rgba(79,195,247,0.08))}
.prayer-item .name-section{display:flex;align-items:center;gap:10px}
.prayer-item .name-section .icon{font-size:20px}
.prayer-item .prayer-name{font-size:16px;font-weight:600}
.prayer-item .prayer-time{font-size:15px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums}
.prayer-item .prayer-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
.prayer-item.current .prayer-time{color:var(--gold)}
.prayer-item.current .prayer-name{color:var(--accent)}
.next-prayer-info{background:var(--card);border-radius:var(--radius);padding:12px;text-align:center;box-shadow:var(--shadow);margin-bottom:8px}
.next-prayer-info .label{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.next-prayer-info .name{font-size:18px;font-weight:700;color:var(--accent)}
.next-prayer-info .time{font-size:14px;color:var(--text-dim);margin-top:2px}
.next-prayer-info .countdown{font-size:24px;font-weight:700;color:var(--gold);margin-top:4px;font-variant-numeric:tabular-nums}

.azkar-cats{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.azkar-cats button{flex-shrink:0;background:var(--card);border:1px solid rgba(79,195,247,0.15);border-radius:20px;padding:8px 18px;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500}
.azkar-cats button.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.azkar-list{display:flex;flex-direction:column;gap:8px}
.azkar-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);border:1px solid transparent;transition:all 0.2s}
.azkar-item .arabic{font-size:21px;line-height:2.2;direction:rtl;font-family:'Noto Naskh Arabic','Traditional Arabic','Amiri','Arial',sans-serif;margin-bottom:6px;color:var(--gold);word-break:keep-all;unicode-bidi:embed}
.azkar-item .transliteration{font-size:13px;color:var(--accent);font-style:italic;margin-bottom:4px;line-height:1.4}
.azkar-item .russian{font-size:13px;color:var(--text-dim);line-height:1.5}
.azkar-item .count{font-size:12px;color:var(--text-dim);margin-top:4px;font-style:italic}

.compass-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0}
.compass{width:260px;height:260px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1A233A,#0f1a2e);border:3px solid var(--accent);position:relative;box-shadow:0 0 40px rgba(79,195,247,0.1);display:flex;align-items:center;justify-content:center}
.compass-inner{width:230px;height:230px;border-radius:50%;border:1px solid rgba(79,195,247,0.15);position:relative;display:flex;align-items:center;justify-content:center}
.compass-label{position:absolute;font-size:13px;font-weight:700;color:var(--text-dim)}
.compass-label.n{top:4px;color:var(--danger)}
.compass-label.s{bottom:4px}
.compass-label.e{right:4px}
.compass-label.w{left:4px}
.needle{width:4px;height:90px;position:absolute;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;align-items:center;z-index:2}
.needle-top{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:40px solid var(--danger)}
.needle-bottom{width:4px;height:50px;background:var(--text-dim);border-radius:2px}
.needle-center{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--card);z-index:3;position:absolute}
.compass-info{margin-top:16px;text-align:center}
.compass-info .degrees{font-size:32px;font-weight:700;color:var(--accent)}
.compass-info .direction-label{font-size:14px;color:var(--text-dim);margin-top:2px}
.compass-info .distance{font-size:13px;color:var(--text-dim);margin-top:6px}
.compass-info .city-qibla{font-size:12px;color:var(--gold);margin-top:6px}
.location-status{font-size:12px;color:var(--text-dim);margin-top:8px;text-align:center}
.location-status.error{color:var(--danger)}
.location-status.success{color:var(--success)}
.tick{position:absolute;top:0;width:2px;height:10px;background:rgba(79,195,247,0.3);left:50%;transform-origin:50% 115px;margin-left:-1px}

/* Settings modal */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;justify-content:center;align-items:flex-start;padding-top:40px}
.settings-overlay.open{display:flex}
.settings-panel{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 -8px 40px rgba(0,0,0,0.4);animation:slideUp 0.25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-panel h3{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px;text-align:center}
.settings-panel .sub{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:16px}
.settings-panel .close-btn{float:right;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:0;line-height:1}
.alarm-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(79,195,247,0.08)}
.alarm-item:last-child{border-bottom:none}
.alarm-time{font-size:20px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.alarm-item .alarm-left{display:flex;align-items:center;gap:12px}
.alarm-del,.alarm-edit{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;line-height:1}
.alarm-del{color:var(--danger)}
.alarm-edit{color:var(--accent)}
.alarm-time-input{font-size:20px;font-weight:700;color:var(--text);background:transparent;border:1px solid var(--accent);border-radius:6px;padding:2px 6px;width:100px;font-variant-numeric:tabular-nums;outline:none}
.add-alarm-btn{width:100%;padding:10px;margin-top:12px;background:var(--accent-dim);border:1px dashed var(--accent);border-radius:10px;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s}
.add-alarm-btn:hover{background:rgba(79,195,247,0.2)}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--text-dim);border-radius:12px;transition:0.3s}
.toggle .slider::before{content:'';position:absolute;width:20px;height:20px;left:2px;bottom:2px;background:var(--card);border-radius:50%;transition:0.3s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(20px)}

@media(max-width:360px){.compass{width:220px;height:220px}.compass-inner{width:195px;height:195px}.needle{height:75px}.needle-top{border-bottom-width:32px;border-left-width:6px;border-right-width:6px}.needle-bottom{height:43px}.tick{transform-origin:50% 98px}}
@media(min-width:480px){.compass{width:300px;height:300px}.compass-inner{width:265px;height:265px}.tick{transform-origin:50% 130px}}
</style>
</head>
<body>
<div id="app">
    <header>
        <div class="header-top">
            <div class="logo">Ночь <span>Кадр</span></div>
            <select id="citySelect"></select>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        <div id="dateDisplay"></div>
    </header>
    <div id="reminderBar" class="reminder">
        🤲 Время делать зикр
    </div>
    <main>
        <section id="tabPrayer" class="tab-content active">
            <div id="nextPrayerInfo" class="next-prayer-info"></div>
            <div class="prayer-list" id="prayerList"></div>
        </section>
        <section id="tabAzkar" class="tab-content">
            <div class="azkar-cats" id="azkarCats">
                <button data-cat="afterPrayer" class="active">После намаза</button>
                <button data-cat="morning">Утренние</button>
                <button data-cat="evening">Вечерние</button>
            </div>
            <div class="azkar-list" id="azkarList"></div>
        </section>
        <section id="tabQibla" class="tab-content">
            <div class="compass-wrap">
                <div class="compass" id="compass">
                    <div class="compass-inner" id="compassInner">
                        <span class="compass-label n">N</span>
                        <span class="compass-label s">S</span>
                        <span class="compass-label e">E</span>
                        <span class="compass-label w">W</span>
                        <div class="needle" id="needle">
                            <div class="needle-top"></div>
                            <div class="needle-bottom"></div>
                        </div>
                        <div class="needle-center" id="needleCenter"></div>
                    </div>
                </div>
                <div class="compass-info">
                    <div class="degrees" id="qiblaDegrees">--°</div>
                    <div class="direction-label" id="qiblaDirection">Выберите город</div>
                    <div class="distance" id="qiblaDistance"></div>
                    <div class="city-qibla" id="cityQiblaInfo"></div>
                </div>
                <div class="location-status" id="locationStatus">Для компаса разрешите геолокацию в браузере</div>
            </div>
        </section>
    </main>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <button class="close-btn" id="settingsClose">✕</button>
            <h3>⚙️ Настроить напоминание</h3>
            <div class="sub">Добавь время — в это время появится напоминание «Время делать зикр»</div>
            <div id="alarmList"></div>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <input type="time" id="alarmTimeInput" value="08:00" style="flex:1;background:var(--bg);color:var(--text);border:1px solid rgba(79,195,247,0.2);border-radius:10px;padding:10px;font-size:16px;outline:none">
                <button class="add-alarm-btn" id="addAlarmBtn">+ Добавить</button>
            </div>
        </div>
    </div>

    <nav id="tabNav">
        <button data-tab="prayer" class="active">
            <span class="nav-icon">🕌</span> Намаз
        </button>
        <button data-tab="azkar">
            <span class="nav-icon">📖</span> Азкары
        </button>
        <button data-tab="qibla">
            <span class="nav-icon">🧭</span> Кибла
        </button>
    </nav>
</div>

<script>
const PRAYER_ORDER = ['fajr','dhuhr','asr','maghrib','isha'];
const PRAYER_LABELS = {fajr:'Фаджр',dhuhr:'Зухр',asr:'Аср',maghrib:'Магриб',isha:'Иша'};
const PRAYER_ICONS = {fajr:'🌙',dhuhr:'☀️',asr:'🌤',maghrib:'🌅',isha:'🌃'};
const KAABA = {lat:21.4225,lng:39.8262};
const SELECTED_CITY_KEY = 'nochkadr_city';
const ALARMS_KEY = 'nochkadr_alarms';
const ALARM_DURATION = 3; // minutes each alarm shows

let selectedCity = null;
let currentTab = 'prayer';
let currentAzkarCat = 'afterPrayer';
let currentTimes = null;
let userLocation = null;
let deviceHeading = null;
let compassActive = false;
let compassCalibrated = false;
let lastPlayedAlarmMin = -1;

function getAlarms() {
    try{
        var s=localStorage.getItem(ALARMS_KEY);
        if(s!==null){var d=JSON.parse(s);if(Array.isArray(d))return d}
    }catch(e){}
    return [];
}

function saveAlarms(a) {
    localStorage.setItem(ALARMS_KEY,JSON.stringify(a));
}

function initCities() {
    const sel = document.getElementById('citySelect');
    sel.innerHTML = '';
    const saved = localStorage.getItem(SELECTED_CITY_KEY);
    CITIES.forEach((c,i)=>{
        const opt=document.createElement('option');
        opt.value=i;opt.textContent=c.name;
        sel.appendChild(opt);
        if(saved&&c.name===saved)sel.value=i;
    });
    selectedCity=CITIES[parseInt(sel.value)];
    sel.addEventListener('change',()=>{
        selectedCity=CITIES[parseInt(sel.value)];
        localStorage.setItem(SELECTED_CITY_KEY,selectedCity.name);
        updateAll();
    });
}

function initSettings() {
    const btn=document.getElementById('settingsBtn');
    const overlay=document.getElementById('settingsOverlay');
    const close=document.getElementById('settingsClose');
    const addBtn=document.getElementById('addAlarmBtn');
    const timeInput=document.getElementById('alarmTimeInput');
    
    btn.addEventListener('click',()=>{renderAlarms();overlay.classList.add('open')});
    close.addEventListener('click',()=>overlay.classList.remove('open'));
    overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open')});
    
    addBtn.addEventListener('click',()=>{
        const val=timeInput.value;
        if(!val)return;
        const alarms=getAlarms();
        // Avoid duplicates
        for(let i=0;i<alarms.length;i++){if(alarms[i].time===val)return}
        alarms.push({time:val,on:true});
        saveAlarms(alarms);
        renderAlarms();
        setTimeout(()=>{
            const list=document.getElementById('alarmList');
            list.lastElementChild&&list.lastElementChild.scrollIntoView({behavior:'smooth'});
        },100);
    });
}

function renderAlarms() {
    const container=document.getElementById('alarmList');
    container.innerHTML='';
    const alarms=getAlarms();
    alarms.sort((a,b)=>a.time.localeCompare(b.time));
    alarms.forEach((a,i)=>{
        const div=document.createElement('div');
        div.className='alarm-item';
        div.innerHTML=`
            <div class="alarm-left">
                <label class="toggle">
                    <input type="checkbox" ${a.on?'checked':''}>
                    <span class="slider"></span>
                </label>
                <span class="alarm-time">${a.time}</span>
            </div>
            <div style="display:flex;gap:4px">
                <button class="alarm-edit" data-idx="${i}">✏️</button>
                <button class="alarm-del" data-idx="${i}">✕</button>
            </div>
        `;
        div.querySelector('input').addEventListener('change',function(){
            alarms[i].on=this.checked;
            saveAlarms(alarms);
        });
        div.querySelector('.alarm-edit').addEventListener('click',function(){
            var timeSpan=div.querySelector('.alarm-time');
            var old=timeSpan.textContent;
            var inp=document.createElement('input');
            inp.type='time';
            inp.value=old;
            inp.className='alarm-time-input';
            timeSpan.replaceWith(inp);
            inp.focus();
            inp.addEventListener('blur',function(){
                if(this.value&&this.value!==old){
                    alarms[i].time=this.value;
                    saveAlarms(alarms);
                }
                renderAlarms();
            });
            inp.addEventListener('keydown',function(e){
                if(e.key==='Enter')this.blur();
                if(e.key==='Escape')renderAlarms();
            });
        });
        div.querySelector('.alarm-del').addEventListener('click',function(){
            alarms.splice(i,1);
            saveAlarms(alarms);
            renderAlarms();
        });
        container.appendChild(div);
    });
}

function addAlarm() {
    const alarms=getAlarms();
    // Default to next hour
    const h=new Date().getHours()+1;
    const time=String(h%24).padStart(2,'0')+':00';
    alarms.push({time,on:true});
    saveAlarms(alarms);
    renderAlarms();
    // Scroll to bottom
    setTimeout(()=>{
        const list=document.getElementById('alarmList');
        list.scrollTop=list.scrollHeight;
    },100);
}

function updateDateDisplay() {
    const d=new Date();
    const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const days=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    document.getElementById('dateDisplay').textContent=`${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function updateAll() {
    updateDateDisplay();
    updatePrayerTimes();
    updateReminder();
    updateCityQibla();
}

function updatePrayerTimes() {
    if(!selectedCity)return;
    const now=new Date();
    const method=selectedCity.method||'Russia';
    const times=Adhan.calculate(now,selectedCity.lat,selectedCity.lng,selectedCity.tz,method);
    currentTimes=times;
    renderPrayers(times);
    renderNextPrayer(times);
    updateReminder();
}

function renderPrayers(times) {
    const container=document.getElementById('prayerList');
    container.innerHTML='';
    PRAYER_ORDER.forEach(name=>{
        const timeStr=times[name];
        const item=document.createElement('div');
        item.className='prayer-item';
        item.innerHTML=`
            <div class="name-section">
                <span class="icon">${PRAYER_ICONS[name]}</span>
                <div>
                    <div class="prayer-name">${PRAYER_LABELS[name]}</div>
                    <div class="prayer-sub">${name==='fajr'?'Рассвет':name==='dhuhr'?'Полдень':name==='asr'?'После полудня':name==='maghrib'?'Закат':'Ночь'}</div>
                </div>
            </div>
            <div class="prayer-time">${timeStr}</div>
        `;
        container.appendChild(item);
    });
    highlightCurrentPrayer();
}

function currentPrayerIdx() {
    if(!currentTimes)return -1;
    const now=new Date();
    const hm=now.getHours()*60+now.getMinutes();
    const raw=currentTimes.raw;
    for(let i=PRAYER_ORDER.length-1;i>=0;i--){
        const t=raw[PRAYER_ORDER[i]];
        if(t===null)continue;
        if(hm>=t*60-1)return i;
    }
    return -1;
}

function highlightCurrentPrayer() {
    const idx=currentPrayerIdx();
    document.querySelectorAll('.prayer-item').forEach((el,i)=>{
        el.classList.toggle('current',i===idx);
    });
}

function renderNextPrayer(times) {
    const container=document.getElementById('nextPrayerInfo');
    if(!times||!selectedCity){container.innerHTML='';return;}
    const now=new Date();
    const hm=now.getHours()*60+now.getMinutes();
    const raw=times.raw;
    let nextIdx=-1;
    for(let i=0;i<PRAYER_ORDER.length;i++){
        const t=raw[PRAYER_ORDER[i]];
        if(t!==null&&hm<t*60){nextIdx=i;break;}
    }
    if(nextIdx===-1)nextIdx=0;
    const name=PRAYER_ORDER[nextIdx];
    const nextTime=times[name];
    const nextRaw=raw[name];
    if(nextRaw===null){container.innerHTML='';return;}
    let diffMin=Math.round(nextRaw*60-hm);
    if(diffMin<0)diffMin+=1440;
    const hours=Math.floor(diffMin/60);
    const mins=diffMin%60;
    const cd=hours>0?`${hours}ч ${mins}м`:`${mins}м`;
    container.innerHTML=`
        <div class="label">Следующий намаз</div>
        <div class="name">${PRAYER_ICONS[name]} ${PRAYER_LABELS[name]}</div>
        <div class="time">${nextTime}</div>
        <div class="countdown">${cd}</div>
    `;
}

function playReminderSound() {
    try{
        var i=0;
        function playNext(){
            if(i>=5)return;
            i++;
            var a=new Audio('уведом.mp3');
            a.volume=0.7;
            a.addEventListener('ended',playNext);
            a.play().catch(playNext);
        }
        playNext();
    }catch(e){}
}

function updateReminder() {
    const bar=document.getElementById('reminderBar');
    const now=new Date();
    const totalMin=now.getHours()*60+now.getMinutes();
    const alarms=getAlarms();
    let show=false;
    let matchedAlarmMin=-1;
    for(let i=0;i<alarms.length;i++){
        const a=alarms[i];
        if(!a.on)continue;
        const parts=a.time.split(':');
        const am=parseInt(parts[0])*60+parseInt(parts[1]);
        if(totalMin>=am&&totalMin<am+ALARM_DURATION){show=true;matchedAlarmMin=am;break}
    }
    bar.classList.toggle('show',show);
    if(show&&matchedAlarmMin!==lastPlayedAlarmMin){
        lastPlayedAlarmMin=matchedAlarmMin;
        playReminderSound();
    }
    if(!show)lastPlayedAlarmMin=-1;
}

function initAzkar() {
    document.getElementById('azkarCats').addEventListener('click',e=>{
        const btn=e.target.closest('button');
        if(btn)switchAzkarCat(btn.dataset.cat);
    });
    switchAzkarCat('afterPrayer');
}

function switchAzkarCat(cat) {
    currentAzkarCat=cat;
    document.querySelectorAll('#azkarCats button').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
    renderAzkar(cat);
}

function renderAzkar(cat) {
    const container=document.getElementById('azkarList');
    container.innerHTML='';
    const items=AZKAR[cat];
    if(!items)return;
    items.forEach(item=>{
        const el=document.createElement('div');
        el.className='azkar-item';
        var arText=item.arabic;
        if(arText.indexOf('\n')>=0)arText=arText.split('\n').join('<br>');
        el.innerHTML=`
            <div class="arabic">${arText}</div>
            <div class="transliteration">${item.transliteration}</div>
            <div class="russian">${item.russian}</div>
            ${item.count>1?`<div class="count">Повторить: ${item.count} раз</div>`:''}
        `;
        container.appendChild(el);
    });
}

function switchTab(tab) {
    currentTab=tab;
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    const id='tab'+tab.charAt(0).toUpperCase()+tab.slice(1);
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('#tabNav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    if(tab==='qibla')initCompass();
}

function initTabNav() {
    document.getElementById('tabNav').addEventListener('click',e=>{
        const btn=e.target.closest('button');
        if(btn)switchTab(btn.dataset.tab);
    });
}

function updateCityQibla() {
    if(!selectedCity)return;
    const bearing=calcBearing(selectedCity.lat,selectedCity.lng,KAABA.lat,KAABA.lng);
    const dirs=['N','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'];
    const idx=Math.round(bearing/45)%8;
    const dist=calcDistance(selectedCity.lat,selectedCity.lng,KAABA.lat,KAABA.lng);
    const el=document.getElementById('cityQiblaInfo');
    el.innerHTML=`По городу ${selectedCity.name}: ${Math.round(bearing)}° (${dirs[idx]}), ${Math.round(dist)} км до Каабы`;
    if(!userLocation||!document.querySelector('#locationStatus').classList.contains('success')){
        document.getElementById('qiblaDegrees').textContent=Math.round(bearing)+'°';
        document.getElementById('qiblaDirection').textContent=`${Math.round(bearing)}° от N (${dirs[idx]})`;
        document.getElementById('qiblaDistance').textContent=`${Math.round(dist)} км до Каабы`;
    }
}

function initCompass() {
    if(compassActive)return;
    compassActive=true;
    const inner=document.getElementById('compassInner');
    for(let i=0;i<72;i++){
        const tick=document.createElement('div');
        tick.className='tick';
        tick.style.transform=`rotate(${i*5}deg)`;
        inner.appendChild(tick);
    }
    const statusEl=document.getElementById('locationStatus');
    if(selectedCity){
        userLocation={lat:selectedCity.lat,lng:selectedCity.lng};
        statusEl.textContent='Используются координаты города (для компаса нужен GPS)';
        statusEl.className='location-status';
        updateQibla();
    }
    if(!navigator.geolocation){
        statusEl.textContent='Geolocation недоступен на этом устройстве';
        statusEl.className='location-status error';
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos=>{
            userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude};
            statusEl.textContent='GPS получен ✓ Точность: '+(pos.coords.accuracy>50?'средняя':'высокая');
            statusEl.className='location-status success';
            updateQibla();
            updateCityQibla();
        },
        err=>{
            if(err.code===1){
                statusEl.textContent='⚠ Нет доступа к геолокации. Компас использует координаты города';
                statusEl.className='location-status error';
            }
        },
        {enableHighAccuracy:true,timeout:8000}
    );
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
        DeviceOrientationEvent.requestPermission().then(state=>{
            if(state==='granted')window.addEventListener('deviceorientation',handleOrientation);
        }).catch(()=>window.addEventListener('deviceorientation',handleOrientation));
    }else{
        window.addEventListener('deviceorientation',handleOrientation);
    }
}

function handleOrientation(e) {
    let heading=null;
    if(e.webkitCompassHeading!==undefined&&e.webkitCompassHeading!==null){
        heading=e.webkitCompassHeading;
        if(!compassCalibrated){compassCalibrated=true;}
    }else if(e.alpha!==null){
        heading=e.alpha;
        if(e.absolute===true&&!compassCalibrated){compassCalibrated=true;}
    }
    if(heading!==null){
        deviceHeading=heading;
        updateQibla();
    }
}

function updateQibla() {
    if(!userLocation)return;
    const bearing=calcBearing(userLocation.lat,userLocation.lng,KAABA.lat,KAABA.lng);
    let qiblaDirection=bearing;
    if(deviceHeading!==null){
        qiblaDirection=bearing-deviceHeading;
        if(qiblaDirection<0)qiblaDirection+=360;
    }
    document.getElementById('qiblaDegrees').textContent=Math.round(bearing)+'°';
    document.getElementById('needle').style.transform=`rotate(${qiblaDirection}deg)`;
    document.getElementById('needleCenter').style.left='50%';
    document.getElementById('needleCenter').style.top='50%';
    const dirs=['N','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'];
    const idx=Math.round(bearing/45)%8;
    document.getElementById('qiblaDirection').textContent=`${Math.round(bearing)}° от N (${dirs[idx]})`;
    const dist=calcDistance(userLocation.lat,userLocation.lng,KAABA.lat,KAABA.lng);
    if(dist<1)document.getElementById('qiblaDistance').textContent='Вы в Мекке! 🕋';
    else document.getElementById('qiblaDistance').textContent=`${Math.round(dist)} км до Каабы`;
}

function calcBearing(lat1,lng1,lat2,lng2) {
    const dLng=(lng2-lng1)*Math.PI/180;
    const rLat1=lat1*Math.PI/180;
    const rLat2=lat2*Math.PI/180;
    const y=Math.sin(dLng)*Math.cos(rLat2);
    const x=Math.cos(rLat1)*Math.sin(rLat2)-Math.sin(rLat1)*Math.cos(rLat2)*Math.cos(dLng);
    return(Math.atan2(y,x)*180/Math.PI+360)%360;
}

function calcDistance(lat1,lng1,lat2,lng2) {
    const R=6371;
    const dLat=(lat2-lat1)*Math.PI/180;
    const dLng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

document.addEventListener('DOMContentLoaded',()=>{
    initCities();
    initSettings();
    initAzkar();
    initTabNav();
    updateAll();
    setInterval(updateAll,30000);
    setInterval(updateReminder,10000);
});
</script>
