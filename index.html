<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ночь Кадр</title>
<link rel="manifest" href="manifest.json">
<script src="cities.js"></script>
<script src="azkar.js"></script>
<script src="adhan.js"></script>
<style>
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
:root {
    --bg: #0D1B2A;
    --card: #1A233A;
    --accent: #4FC3F7;
    --accent-dim: rgba(79, 195, 247, 0.15);
    --text: #E0E0E0;
    --text-dim: #8899AA;
    --success: #66BB6A;
    --gold: #FFD54F;
    --danger: #EF5350;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
}
html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
#app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
}

header {
    background: var(--card);
    padding: 12px 16px 8px;
    border-bottom: 1px solid rgba(79,195,247,0.1);
    flex-shrink: 0;
}
.header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
}
.logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: 0.5px;
}
.logo span {
    color: var(--gold);
}
.header-top select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    outline: none;
    max-width: 160px;
    cursor: pointer;
}
#dateDisplay {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
}

.reminder {
    background: linear-gradient(135deg, rgba(79,195,247,0.12), rgba(79,195,247,0.05));
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin: 8px 12px 0;
    text-align: center;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.3px;
    display: none;
    flex-shrink: 0;
    animation: pulseReminder 2s ease-in-out infinite;
}
.reminder.show {
    display: block;
}
@keyframes pulseReminder {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; box-shadow: 0 0 16px rgba(79,195,247,0.15); }
}

main {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
}
main::-webkit-scrollbar { width: 0; height: 0; }

.tab-content { display: none; }
.tab-content.active { display: block; }

nav {
    display: flex;
    background: var(--card);
    border-top: 1px solid rgba(79,195,247,0.1);
    flex-shrink: 0;
    padding: 4px 0;
    padding-bottom: max(4px, env(safe-area-inset-bottom, 4px));
}
nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 4px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 8px;
    margin: 0 2px;
}
nav button .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
nav button.active {
    color: var(--accent);
    background: var(--accent-dim);
}

.prayer-list { display: flex; flex-direction: column; gap: 8px; }
.prayer-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    border: 1px solid transparent;
    transition: all 0.25s;
}
.prayer-item.done {
    border-color: rgba(102,187,106,0.3);
    background: linear-gradient(135deg, var(--card), rgba(102,187,106,0.06));
}
.prayer-item.current {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--card), rgba(79,195,247,0.08));
}
.prayer-info { display: flex; flex-direction: column; }
.prayer-name {
    font-size: 16px;
    font-weight: 600;
}
.prayer-time {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
}
.prayer-item.done .prayer-name { color: var(--success); }
.prayer-check {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--text-dim);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.25s;
    flex-shrink: 0;
}
.prayer-check.done {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 0 12px rgba(102,187,106,0.3);
}

.stats-bar {
    display: flex;
    justify-content: space-around;
    margin-top: 14px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px;
    box-shadow: var(--shadow);
}
.stat-item { text-align: center; }
.stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
}
.stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
}

.azkar-cats {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
}
.azkar-cats button {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid rgba(79,195,247,0.15);
    border-radius: 20px;
    padding: 8px 18px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
}
.azkar-cats button.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
}
.azkar-list { display: flex; flex-direction: column; gap: 8px; }
.azkar-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    border: 1px solid transparent;
    transition: all 0.2s;
}
.azkar-item.done {
    border-color: rgba(102,187,106,0.3);
    opacity: 0.7;
}
.azkar-item .arabic {
    font-size: 20px;
    line-height: 1.6;
    direction: rtl;
    font-family: 'Traditional Arabic', 'Scheherazade New', 'Amiri', serif;
    margin-bottom: 6px;
    color: var(--gold);
}
.azkar-item .russian {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
}
.azkar-item .azkar-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
}
.azkar-item .azkar-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--text-dim);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
}
.azkar-item .azkar-check.done {
    background: var(--success);
    border-color: var(--success);
}
.azkar-item .count {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
}

.compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
}
.compass {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #1A233A, #0f1a2e);
    border: 3px solid var(--accent);
    position: relative;
    box-shadow: 0 0 40px rgba(79,195,247,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
}
.compass-inner {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    border: 1px solid rgba(79,195,247,0.15);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}
.compass-label {
    position: absolute;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
}
.compass-label.n { top: 4px; color: var(--danger); }
.compass-label.s { bottom: 4px; }
.compass-label.e { right: 4px; }
.compass-label.w { left: 4px; }

.needle {
    width: 4px;
    height: 90px;
    position: absolute;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
}
.needle-top {
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 40px solid var(--danger);
}
.needle-bottom {
    width: 4px;
    height: 50px;
    background: var(--text-dim);
    border-radius: 2px;
}
.needle-center {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--card);
    z-index: 3;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.kaaba-icon {
    width: 20px;
    height: 20px;
    position: absolute;
    top: 50%;
    left: 50%;
    margin-left: -10px;
    margin-top: -50px;
    z-index: 1;
    font-size: 18px;
}
.compass-info {
    margin-top: 20px;
    text-align: center;
}
.compass-info .degrees {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
}
.compass-info .direction-label {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 4px;
}
.compass-info .distance {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
}
.location-status {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    text-align: center;
}
.location-status.error { color: var(--danger); }
.location-status.success { color: var(--success); }

@media (max-width: 360px) {
    .compass { width: 220px; height: 220px; }
    .compass-inner { width: 195px; height: 195px; }
    .needle { height: 75px; }
    .needle-top { border-bottom-width: 32px; border-left-width: 6px; border-right-width: 6px; }
    .needle-bottom { height: 43px; }
}
@media (min-width: 480px) {
    .compass { width: 300px; height: 300px; }
    .compass-inner { width: 265px; height: 265px; }
}
</style>
</head>
<body>
<div id="app">
    <header>
        <div class="header-top">
            <div class="logo">Ночь <span>Кадр</span></div>
            <select id="citySelect"></select>
        </div>
        <div id="dateDisplay"></div>
    </header>
    <div id="reminderBar" class="reminder">
        🤲 Помяни Господа своего!
    </div>
    <main>
        <section id="tabPrayer" class="tab-content active">
            <div class="prayer-list" id="prayerList"></div>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item"><div class="stat-value" id="todayCount">0</div><div class="stat-label">Сегодня</div></div>
                <div class="stat-item"><div class="stat-value" id="weekCount">0</div><div class="stat-label">За неделю</div></div>
                <div class="stat-item"><div class="stat-value" id="streakCount">0</div><div class="stat-label">Подряд</div></div>
            </div>
        </section>
        <section id="tabAzkar" class="tab-content">
            <div class="azkar-cats" id="azkarCats">
                <button data-cat="afterPrayer" class="active">После намаза</button>
                <button data-cat="morning">Утренние</button>
                <button data-cat="evening">Вечерние</button>
            </div>
            <div class="azkar-list" id="azkarList"></div>
        </section>
        <section id="tabQibla" class="tab-content">
            <div class="compass-wrap">
                <div class="compass" id="compass">
                    <div class="compass-inner">
                        <span class="compass-label n">N</span>
                        <span class="compass-label s">S</span>
                        <span class="compass-label e">E</span>
                        <span class="compass-label w">W</span>
                        <div class="needle" id="needle">
                            <div class="needle-top"></div>
                            <div class="needle-bottom"></div>
                        </div>
                        <div class="needle-center"></div>
                        <div class="kaaba-icon" id="kaabaIcon" style="display:none;">🕋</div>
                    </div>
                </div>
                <div class="compass-info">
                    <div class="degrees" id="qiblaDegrees">--°</div>
                    <div class="direction-label" id="qiblaDirection">Определение...</div>
                    <div class="distance" id="qiblaDistance"></div>
                </div>
                <div class="location-status" id="locationStatus">Запрос местоположения...</div>
            </div>
        </section>
    </main>
    <nav id="tabNav">
        <button data-tab="prayer" class="active">
            <span class="nav-icon">🕌</span> Намаз
        </button>
        <button data-tab="azkar">
            <span class="nav-icon">📖</span> Азкары
        </button>
        <button data-tab="qibla">
            <span class="nav-icon">🧭</span> Кибла
        </button>
    </nav>
</div>

<script>
const PRAYER_NAMES = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
const PRAYER_LABELS = {
    fajr: 'Фаджр', sunrise: 'Восход', dhuhr: 'Зухр',
    asr: 'Аср', maghrib: 'Магриб', isha: 'Иша'
};
const PRAYER_ORDER = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
const KAABA = { lat: 21.4225, lng: 39.8262 };
const STORAGE_KEY = 'nochkadr_data';
const SELECTED_CITY_KEY = 'nochkadr_city';
const PRAYER_DONE_KEY = 'nochkadr_prayers';
const AZKAR_DONE_KEY = 'nochkadr_azkar';

let selectedCity = null;
let currentTab = 'prayer';
let currentAzkarCat = 'afterPrayer';
let prayersDone = {};
let azkarDone = {};
let userLocation = null;
let deviceHeading = 0;
let compassActive = false;

function savePrayers() {
    localStorage.setItem(PRAYER_DONE_KEY, JSON.stringify(prayersDone));
}
function loadPrayers() {
    try { prayersDone = JSON.parse(localStorage.getItem(PRAYER_DONE_KEY)) || {}; } catch { prayersDone = {}; }
}
function saveAzkar() {
    localStorage.setItem(AZKAR_DONE_KEY, JSON.stringify(azkarDone));
}
function loadAzkar() {
    try { azkarDone = JSON.parse(localStorage.getItem(AZKAR_DONE_KEY)) || {}; } catch { azkarDone = {}; }
}

function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayPrayers() {
    return prayersDone[todayKey()] || {};
}

function setPrayerDone(name, done) {
    const key = todayKey();
    if (!prayersDone[key]) prayersDone[key] = {};
    prayersDone[key][name] = done;
    savePrayers();
}

function isPrayerDone(name) {
    const today = getTodayPrayers();
    return today[name] === true;
}

function getAzkarKey(cat, idx) {
    return `${todayKey()}_${cat}_${idx}`;
}

function isAzkarDone(cat, idx) {
    return azkarDone[getAzkarKey(cat, idx)] === true;
}

function setAzkarDone(cat, idx, done) {
    if (done) {
        azkarDone[getAzkarKey(cat, idx)] = true;
    } else {
        delete azkarDone[getAzkarKey(cat, idx)];
    }
    saveAzkar();
}

function initCities() {
    const sel = document.getElementById('citySelect');
    sel.innerHTML = '';
    const saved = localStorage.getItem(SELECTED_CITY_KEY);
    let found = false;
    CITIES.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = c.name;
        sel.appendChild(opt);
        if (saved && c.name === saved) { sel.value = i; found = true; }
    });
    if (!found && CITIES.length > 0) sel.value = 0;
    selectedCity = CITIES[parseInt(sel.value)];
    sel.addEventListener('change', () => {
        selectedCity = CITIES[parseInt(sel.value)];
        localStorage.setItem(SELECTED_CITY_KEY, selectedCity.name);
        updatePrayerTimes();
        updateReminder();
    });
}

function updateDateDisplay() {
    const d = new Date();
    const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    document.getElementById('dateDisplay').textContent =
        `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

let currentTimes = null;

function updatePrayerTimes() {
    if (!selectedCity) return;
    const now = new Date();
    const times = Adhan.calculate(
        now, selectedCity.lat, selectedCity.lng, selectedCity.tz, 'Russia'
    );
    currentTimes = times;
    renderPrayers(times);
    updateReminder();
}

function renderPrayers(times) {
    const container = document.getElementById('prayerList');
    container.innerHTML = '';
    PRAYER_ORDER.forEach(name => {
        const timeStr = times[name];
        const done = isPrayerDone(name);
        const item = document.createElement('div');
        item.className = 'prayer-item' + (done ? ' done' : '');
        item.innerHTML = `
            <div class="prayer-info">
                <div class="prayer-name">${PRAYER_LABELS[name]}</div>
                <div class="prayer-time">${timeStr}</div>
            </div>
            <div class="prayer-check${done ? ' done' : ''}" data-prayer="${name}">
                ${done ? '✓' : ''}
            </div>
        `;
        item.querySelector('.prayer-check').addEventListener('click', () => {
            const newDone = !isPrayerDone(name);
            setPrayerDone(name, newDone);
            renderPrayers(times);
            updateStats();
            if (newDone && name === currentPrayerName()) {
                showAfterPrayerAzkar(name);
            }
        });
        container.appendChild(item);
    });
    updateStats();
    highlightCurrentPrayer();
}

function currentPrayerName() {
    if (!currentTimes) return null;
    const now = new Date();
    const hm = now.getHours() * 60 + now.getMinutes();
    const raw = currentTimes.raw;
    let current = null;
    const order = [
        { name: 'fajr', time: raw.fajr },
        { name: 'dhuhr', time: raw.dhuhr },
        { name: 'asr', time: raw.asr },
        { name: 'maghrib', time: raw.maghrib },
        { name: 'isha', time: raw.isha }
    ];
    for (let i = order.length - 1; i >= 0; i--) {
        const t = order[i].time * 60;
        if (hm >= t - 1) { current = order[i].name; break; }
    }
    return current;
}

function highlightCurrentPrayer() {
    const current = currentPrayerName();
    document.querySelectorAll('.prayer-item').forEach((el, i) => {
        el.classList.remove('current');
        if (PRAYER_ORDER[i] === current && !isPrayerDone(current)) {
            el.classList.add('current');
        }
    });
}

function updateStats() {
    const today = getTodayPrayers();
    let todayCount = 0;
    PRAYER_ORDER.forEach(p => { if (today[p]) todayCount++; });
    document.getElementById('todayCount').textContent = todayCount;

    let weekCount = 0;
    let weekDays = 0;
    for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const day = prayersDone[key];
        if (day) {
            let c = 0;
            PRAYER_ORDER.forEach(p => { if (day[p]) c++; });
            weekCount += c;
            weekDays++;
        }
    }
    document.getElementById('weekCount').textContent = weekCount;

    let streak = 0;
    for (let i = 0; ; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const day = prayersDone[key];
        if (!day) break;
        let all = true;
        PRAYER_ORDER.forEach(p => { if (!day[p]) all = false; });
        if (all) streak++;
        else break;
    }
    document.getElementById('streakCount').textContent = streak;
}

function updateReminder() {
    const bar = document.getElementById('reminderBar');
    if (!currentTimes) { bar.classList.remove('show'); return; }
    const current = currentPrayerName();
    if (current && !isPrayerDone(current)) {
        bar.classList.add('show');
    } else {
        bar.classList.remove('show');
    }
}

function showAfterPrayerAzkar(prayerName) {
    switchTab('azkar');
    switchAzkarCat('afterPrayer');
}

function initAzkar() {
    const cats = document.getElementById('azkarCats');
    cats.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        switchAzkarCat(btn.dataset.cat);
    });
    switchAzkarCat('afterPrayer');
}

function switchAzkarCat(cat) {
    currentAzkarCat = cat;
    document.querySelectorAll('#azkarCats button').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat);
    });
    renderAzkar(cat);
}

function renderAzkar(cat) {
    const container = document.getElementById('azkarList');
    container.innerHTML = '';
    const items = AZKAR[cat];
    if (!items) return;
    items.forEach((item, idx) => {
        const done = isAzkarDone(cat, idx);
        const el = document.createElement('div');
        el.className = 'azkar-item' + (done ? ' done' : '');
        el.innerHTML = `
            <div class="azkar-header">
                <div style="flex:1">
                    <div class="arabic">${item.arabic}</div>
                    <div class="russian">${item.russian}</div>
                    <div class="count">${item.count > 1 ? `Повторить: ${item.count} раз` : ''}</div>
                </div>
                <div class="azkar-check${done ? ' done' : ''}" data-cat="${cat}" data-idx="${idx}">
                    ${done ? '✓' : ''}
                </div>
            </div>
        `;
        el.querySelector('.azkar-check').addEventListener('click', () => {
            const newDone = !isAzkarDone(cat, idx);
            setAzkarDone(cat, idx, newDone);
            renderAzkar(cat);
        });
        container.appendChild(el);
    });
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.querySelectorAll('#tabNav button').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
    });
    if (tab === 'qibla') initCompass();
}

function initTabNav() {
    document.getElementById('tabNav').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        switchTab(btn.dataset.tab);
    });
}

function initCompass() {
    if (compassActive) return;
    compassActive = true;
    document.getElementById('locationStatus').textContent = 'Получение местоположения...';

    if (!navigator.geolocation) {
        document.getElementById('locationStatus').textContent = 'Geolocation недоступен';
        document.getElementById('locationStatus').className = 'location-status error';
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('locationStatus').textContent = 'Местоположение получено ✓';
            document.getElementById('locationStatus').className = 'location-status success';
            updateQibla();
            startOrientation();
        },
        (err) => {
            document.getElementById('locationStatus').textContent = 'Ошибка: ' + err.message;
            document.getElementById('locationStatus').className = 'location-status error';
            if (err.code === 1) {
                document.getElementById('locationStatus').textContent = 'Разрешите доступ к геолокации в настройках браузера';
            }
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

function startOrientation() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }).catch(() => {});
    } else {
        window.addEventListener('deviceorientation', handleOrientation);
    }
}

function handleOrientation(e) {
    if (e.alpha !== null) {
        deviceHeading = e.alpha;
        updateQibla();
    }
}

function updateQibla() {
    if (!userLocation) return;
    const bearing = calcBearing(userLocation.lat, userLocation.lng, KAABA.lat, KAABA.lng);
    let qiblaDirection = bearing - deviceHeading;
    if (qiblaDirection < 0) qiblaDirection += 360;

    document.getElementById('qiblaDegrees').textContent = Math.round(bearing) + '°';
    document.getElementById('needle').style.transform = `rotate(${qiblaDirection}deg)`;
    document.getElementById('kaabaIcon').style.display = 'block';
    document.getElementById('kaabaIcon').style.transform = `rotate(${-qiblaDirection}deg)`;

    const dirs = ['N', 'СВ', 'В', 'ЮВ', 'Ю', 'ЮЗ', 'З', 'СЗ'];
    const idx = Math.round(bearing / 45) % 8;
    document.getElementById('qiblaDirection').textContent = `${Math.round(bearing)}° от N (${dirs[idx]})`;

    const dist = calcDistance(userLocation.lat, userLocation.lng, KAABA.lat, KAABA.lng);
    if (dist < 10) {
        document.getElementById('qiblaDistance').textContent = `Вы в Мекке! 🕋`;
    } else if (dist < 1000) {
        document.getElementById('qiblaDistance').textContent = `${Math.round(dist)} км до Каабы`;
    } else {
        document.getElementById('qiblaDistance').textContent = `${Math.round(dist)} км до Каабы`;
    }
}

function calcBearing(lat1, lng1, lat2, lng2) {
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const rLat1 = lat1 * Math.PI / 180;
    const rLat2 = lat2 * Math.PI / 180;
    const y = Math.sin(dLng) * Math.cos(rLat2);
    const x = Math.cos(rLat1) * Math.sin(rLat2) - Math.sin(rLat1) * Math.cos(rLat2) * Math.cos(dLng);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function periodicUpdate() {
    updateDateDisplay();
    updatePrayerTimes();
    updateReminder();
    highlightCurrentPrayer();
}

document.addEventListener('DOMContentLoaded', () => {
    loadPrayers();
    loadAzkar();
    initCities();
    updateDateDisplay();
    updatePrayerTimes();
    initAzkar();
    initTabNav();
    updateReminder();

    setInterval(periodicUpdate, 30000);
    setInterval(updateReminder, 10000);
});
</script>
